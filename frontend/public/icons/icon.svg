<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b0f"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Border -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#1f2128" stroke-width="3"/>
  <!-- Invoice icon -->
  <g transform="translate(156, 136)">
    <!-- Paper -->
    <rect x="0" y="0" width="200" height="260" rx="16" fill="#1a1d24" stroke="#2a2d34" stroke-width="2"/>
    <!-- Header bar -->
    <rect x="0" y="0" width="200" height="56" rx="16" fill="#6c63ff"/>
    <rect x="0" y="28" width="200" height="28" fill="#6c63ff"/>
    <!-- Lines -->
    <rect x="28" y="80" width="120" height="12" rx="6" fill="#4a4d54"/>
    <rect x="28" y="108" width="90" height="12" rx="6" fill="#3a3d44"/>
    <rect x="28" y="144" width="144" height="2" rx="1" fill="#1f2128"/>
    <rect x="28" y="166" width="100" height="10" rx="5" fill="#4a4d54"/>
    <rect x="28" y="190" width="70" height="10" rx="5" fill="#3a3d44"/>
    <rect x="28" y="216" width="144" height="2" rx="1" fill="#1f2128"/>
    <!-- Amount -->
    <rect x="28" y="236" width="60" height="14" rx="7" fill="#6c63ff"/>
  </g>
  <!-- € symbol overlay -->
  <text x="256" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#f0f0f2">€</text>
</svg>
