name: Build AAB Release v52

on:
  workflow_dispatch:

jobs:
  aab-release:
    name: AAB Release — Play Store ready
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;35.0.0 ndk;27.2.12479018'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create .env for production build
        run: |
          echo "EXPO_PUBLIC_REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }}" > .env
          echo ".env file created for production build"

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install --clean

      - name: Patch repositories to avoid Sonatype snapshots timeout
        run: |
          for f in android/build.gradle android/app/build.gradle android/settings.gradle; do
            [ -f "$f" ] && sed -i "/oss.sonatype.org\/content\/repositories\/snapshots/d" "$f"
          done
          python3 scripts/patch_repos.py android/build.gradle android/settings.gradle

      - name: Inject Gradle init script to block Sonatype snapshots
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/remove-sonatype-snapshots.gradle <<'INITSCRIPT'
          allprojects {
              beforeEvaluate { project ->
                  project.repositories.all { repo ->
                      if (repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')) {
                          project.repositories.remove repo
                      }
                  }
                  project.buildscript.repositories.all { repo ->
                      if (repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')) {
                          project.buildscript.repositories.remove repo
                      }
                  }
              }
              afterEvaluate { project ->
                  project.repositories.removeIf { repo ->
                      repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')
                  }
                  project.buildscript.repositories.removeIf { repo ->
                      repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')
                  }
              }
          }
          settingsEvaluated { settings ->
              settings.dependencyResolutionManagement.repositories.removeIf { repo ->
                  repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')
              }
          }
          INITSCRIPT

      - name: Decode release keystore from secret (with size assertion + chmod 600)
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          ls -la android/app/release.keystore
          if [ ! -s android/app/release.keystore ]; then
            echo "❌ Keystore file is empty — ANDROID_KEYSTORE_BASE64 secret missing or malformed"
            exit 1
          fi
          chmod 600 android/app/release.keystore
          echo "✅ Keystore decoded and secured (mode 600)"

      - name: Patch build.gradle + gradle.properties (idempotent, asserts at end)
        run: python3 scripts/patch_build_gradle.py
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build AAB Release
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Locate AAB
        if: always()
        run: find android -name "*.aab" 2>/dev/null || echo "AAB non trovato"

      - name: Verify AAB versionCode / package matches app.json
        if: always()
        run: |
          AAB=$(find android -name "*.aab" 2>/dev/null | head -1)
          if [ -z "$AAB" ]; then
            echo "❌ AAB not found — bundleRelease failed"
            exit 1
          fi
          echo "AAB found at: $AAB"
          AAPT2=$(find $ANDROID_HOME/build-tools -name aapt2 -type f 2>/dev/null | sort | tail -1)
          echo "Using aapt2: $AAPT2"
          # Extract versionCode, versionName, package from the bundle
          $AAPT2 dump badging "$AAB" 2>&1 | head -25
          # Compare with app.json (read from $GITHUB_WORKSPACE)
          EXPECTED_VC=$(python3 -c "import json; print(json.load(open('app.json'))['expo']['android']['versionCode'])")
          EXPECTED_PKG=$(python3 -c "import json; print(json.load(open('app.json'))['expo']['android']['package'])")
          ACTUAL_VC=$($AAPT2 dump badging "$AAB" 2>/dev/null | grep -oP 'versionCode=\K[0-9]+' | head -1)
          ACTUAL_PKG=$($AAPT2 dump badging "$AAB" 2>/dev/null | grep -oP "package: name=\K'[^']+'" | head -1 | tr -d "'")
          echo ""
          echo "Expected: versionCode=$EXPECTED_VC, package=$EXPECTED_PKG"
          echo "Actual:   versionCode=$ACTUAL_VC, package=$ACTUAL_PKG"
          if [ "$ACTUAL_VC" != "$EXPECTED_VC" ]; then
            echo "❌ Version code mismatch — would be SHADOWED on Play Console!"
            exit 1
          fi
          if [ "$ACTUAL_PKG" != "$EXPECTED_PKG" ]; then
            echo "❌ Package name mismatch — Play Console will REJECT!"
            exit 1
          fi
          echo "✅ AAB verified: versionCode=$ACTUAL_VC, package=$ACTUAL_PKG matches app.json"

      - name: Upload AAB Release
        uses: actions/upload-artifact@v4
        with:
          name: VELA-v52-AAB
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
