name: Build AAB Release v35

on:
  workflow_dispatch:

jobs:
  aab-release:
    name: AAB Release — Play Store ready
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install --clean

      - name: Patch repositories to avoid Sonatype snapshots timeout
        run: |
          for f in android/build.gradle android/app/build.gradle android/settings.gradle; do
            [ -f "$f" ] && sed -i "/oss.sonatype.org\/content\/repositories\/snapshots/d" "$f"
          done
          python3 scripts/patch_repos.py android/build.gradle android/settings.gradle

      - name: Inject Gradle init script to block Sonatype snapshots
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/remove-sonatype-snapshots.gradle <<'EOF'
          allprojects {
              afterEvaluate { project ->
                  project.repositories.removeIf { repo ->
                      repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org/content/repositories/snapshots')
                  }
                  project.buildscript.repositories.removeIf { repo ->
                      repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org/content/repositories/snapshots')
                  }
              }
          }
          EOF

      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias vela_release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "VelaStorePass2026!" \
            -keypass "VelaStorePass2026!" \
            -dname "CN=VELA, OU=Mobile, O=VELA Apps, L=Rome, ST=Lazio, C=IT"

      - name: Patch build.gradle for release signing
        run: python3 scripts/patch_build_gradle.py
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: VelaStorePass2026!
          ANDROID_KEY_ALIAS: vela_release
          ANDROID_KEY_PASSWORD: VelaStorePass2026!

      - name: Build AAB Release
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: VelaStorePass2026!
          ANDROID_KEY_ALIAS: vela_release
          ANDROID_KEY_PASSWORD: VelaStorePass2026!

      - name: Locate AAB
        if: always()
        run: find android -name "*.aab" 2>/dev/null || echo "AAB non trovato"

      - name: Upload AAB Release
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceStudio-v35-AAB
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
