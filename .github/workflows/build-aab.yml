name: Build AAB Release v35

on:
  workflow_dispatch:

jobs:
  aab-release:
    name: AAB Release — Play Store ready
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install --clean

      - name: Patch repositories to avoid Sonatype snapshots timeout
        run: |
          # Expo prebuild may add maven { url 'https://oss.sonatype.org/content/repositories/snapshots' }
          # which is currently timing out (504). Force stable repositories first and drop the snapshot repo.
          for f in android/build.gradle android/app/build.gradle; do
            if [ -f "$f" ]; then
              sed -i "/oss.sonatype.org\/content\/repositories\/snapshots/d" "$f"
              echo "✅ Removed Sonatype snapshots repo from $f"
            fi
          done

      - name: Restore release keystore
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          chmod 600 android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Verify release keystore SHA1
        run: bash scripts/verify_android_keystore.sh
        env:
          ANDROID_KEYSTORE_PATH: android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          EXPECTED_UPLOAD_SHA1: 90:F1:18:35:82:7F:1C:5E:C5:5C:07:B8:D3:1B:27:D1:30:7C:75:24

      - name: Patch build.gradle for release signing
        run: python3 scripts/patch_build_gradle.py
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build AAB Release
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Locate AAB
        if: always()
        run: find android -name "*.aab" 2>/dev/null || echo "AAB non trovato"

      - name: Upload AAB Release
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceStudio-v35-AAB
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
