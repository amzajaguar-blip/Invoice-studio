name: Build AAB Release v43

on:
  workflow_dispatch:

jobs:
  aab-release:
    name: AAB Release — Play Store ready
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;27.2.12479018'

      - name: Install dependencies
        run: npm ci

      - name: Create .env for production build
        run: |
          echo "EXPO_PUBLIC_REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }}" > .env
          echo ".env file created for production build"

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install --clean

      - name: Patch repositories to avoid Sonatype snapshots timeout
        run: |
          for f in android/build.gradle android/app/build.gradle android/settings.gradle; do
            [ -f "$f" ] && sed -i "/oss.sonatype.org\/content\/repositories\/snapshots/d" "$f"
          done
          python3 scripts/patch_repos.py android/build.gradle android/settings.gradle

      - name: Inject Gradle init script to block Sonatype snapshots
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/remove-sonatype-snapshots.gradle <<'INITSCRIPT'
          allprojects {
              beforeEvaluate { project ->
                  project.repositories.all { repo ->
                      if (repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')) {
                          project.repositories.remove repo
                      }
                  }
                  project.buildscript.repositories.all { repo ->
                      if (repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')) {
                          project.buildscript.repositories.remove repo
                      }
                  }
              }
              afterEvaluate { project ->
                  project.repositories.removeIf { repo ->
                      repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')
                  }
                  project.buildscript.repositories.removeIf { repo ->
                      repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')
                  }
              }
          }
          settingsEvaluated { settings ->
              settings.dependencyResolutionManagement.repositories.removeIf { repo ->
                  repo instanceof MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')
              }
          }
          INITSCRIPT

      - name: Decode release keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Patch build.gradle for release signing
        run: python3 scripts/patch_build_gradle.py
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build AAB Release
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Locate AAB
        if: always()
        run: find android -name "*.aab" 2>/dev/null || echo "AAB non trovato"

      - name: Upload AAB Release
        uses: actions/upload-artifact@v4
        with:
          name: VELA-v43-AAB
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
