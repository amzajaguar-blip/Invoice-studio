name: Build APK Debug v31

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  apk-debug:
    name: APK Debug — installabile su Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (genera cartella android/)
        run: npx expo prebuild --platform android --no-install --clean

      - name: Build APK Debug
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        if: always()
        run: find android -name "*.apk" 2>/dev/null || echo "APK non trovato"

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceStudio-v31-DEBUG
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
