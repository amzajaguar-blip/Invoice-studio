name: Build TWA (APK + AAB)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: TypeScript + ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/

  build-nextjs:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      NEXT_PUBLIC_APP_URL: https://invoicestudio.app
      TURBOPACK: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Cache Next.js build
        uses: actions/cache/save@v4
        with:
          path: frontend/.next
          key: nextjs-${{ github.sha }}

  build-mobile-aab:
    name: Build Mobile AAB (v10)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - run: npm ci

      - name: Prebuild Android (generate android/)
        run: npx expo prebuild --platform android --no-install

      - name: Use TWA upload keystore (SHA1 90:F1:18:...)
        run: |
          echo "" | base64 -d > android/app/debug.keystore
          sed -i "s/keyAlias 'androiddebugkey'/keyAlias 'invoicestudio'/" android/app/build.gradle

      - name: Bundle AAB
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Find AAB (debug)
        if: always()
        run: |
          echo "=== Searching for .aab files ==="
          find android -name "*.aab" 2>/dev/null || echo "No .aab found"
          echo "=== Release output dir ==="
          ls -la android/app/build/outputs/bundle/release/ 2>/dev/null || echo "Dir not found"

      - name: Upload Mobile AAB v10
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceStudio-Mobile-AAB-v10
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload Mapping File (Deobfuscation)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceStudio-Mapping-v10
          path: mobile/android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 90

  build-twa:
    name: Build TWA APK + AAB
    runs-on: ubuntu-latest
    needs: build-nextjs
    env:
      NEXT_PUBLIC_APP_URL: https://invoicestudio.app
      ANDROID_HOME: /usr/local/lib/android/sdk
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure bubblewrap (skip interactive JDK/SDK prompts)
        run: |
          # bubblewrap loadOrCreateConfig() reads ~/.bubblewrap/config.json on
          # every command and only prompts when jdkPath/androidSdkPath are empty.
          # Pre-writing this file with valid paths skips the interactive setup
          # entirely. JAVA_HOME is set by setup-java@v4; ANDROID_HOME by env above.
          # Schema source: node_modules/@bubblewrap/core/dist/lib/Config.js
          mkdir -p "$HOME/.bubblewrap"
          cat > "$HOME/.bubblewrap/config.json" <<EOF
          {"jdkPath":"${JAVA_HOME}","androidSdkPath":"${ANDROID_HOME}"}
          EOF
          echo "Bubblewrap config written to $HOME/.bubblewrap/config.json:"
          cat "$HOME/.bubblewrap/config.json"
          echo ""
          echo "bubblewrap doctor check:"
          bubblewrap doctor || true

      # ─── Generate debug keystore (replace with your own for production) ──────

      - name: Generate debug keystore
        if: github.event_name == 'workflow_dispatch'
        run: |
          keytool -genkey -v \
            -keystore twa/debug.keystore \
            -alias invoicestudio \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=InvoiceStudio, OU=Dev, O=InvoiceStudio, L=Milan, ST=Italy, C=IT"

      - name: Initialize TWA project
        run: |
          mkdir -p twa
          cd twa
          if [ -d "app" ]; then
            echo "TWA project already initialized, skipping bubblewrap init."
            exit 0
          fi
          # With ~/.bubblewrap/config.json pre-populated above, bubblewrap init
          # skips its JDK/SDK setup prompts. We close stdin (< /dev/null) so any
          # leftover inquirer prompt (which spin-loops on a non-TTY otherwise)
          # immediately receives EOF and uses defaults instead of looping.
          bubblewrap init \
            --manifest "${{ env.NEXT_PUBLIC_APP_URL }}/manifest.json" \
            --directory . \
            --package-name com.invoicestudio.app \
            --name "InvoiceStudio" \
            --short-name "InvoiceStudio" \
            --launcher-name "InvoiceStudio" \
            --display "standalone" \
            --theme-color "#0a0b0f" \
            --background-color "#0a0b0f" \
            --start-url "/dashboard" \
            --fallback-url "${{ env.NEXT_PUBLIC_APP_URL }}/dashboard" \
            < /dev/null

      - name: Copy assetlinks.json
        run: |
          mkdir -p twa/app/src/main/assets
          cp public/.well-known/assetlinks.json twa/app/src/main/assets/

      - name: Update TWA manifest
        run: |
          cd twa
          # Set the correct host for Digital Asset Links verification
          sed -i 's|hostName = .*|hostName = "invoicestudio.app"|' app/src/main/java/com/invoicestudio/app/LauncherActivity.java 2>/dev/null || true

      - name: Build APK (debug)
        run: |
          cd twa
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build AAB (release)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd twa
          chmod +x gradlew
          ./gradlew bundleRelease || echo "AAB build skipped — needs release signing key"

      # ─── Upload artifacts ───────────────────────────────────────────────────

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceStudio-APK
          path: frontend/twa/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload AAB
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceStudio-AAB
          path: frontend/twa/app/build/outputs/bundle/release/*.aab
          retention-days: 90

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [verify, build-nextjs, build-twa, build-mobile-aab]
    if: always()
    steps:
      - name: Build status
        run: |
          echo "## 🏗️ InvoiceStudio Build Status" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript + ESLint | ${{ needs.verify.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Next.js build | ${{ needs.build-nextjs.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TWA APK + AAB | ${{ needs.build-twa.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile AAB (v10) | ${{ needs.build-mobile-aab.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📱 **APK download**: Go to Actions → Artifacts → InvoiceStudio-APK" >> $GITHUB_STEP_SUMMARY
          echo "📦 **AAB download**: Go to Actions → Artifacts → InvoiceStudio-AAB (release only)" >> $GITHUB_STEP_SUMMARY
