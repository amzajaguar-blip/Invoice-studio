name: Build InvoiceStudio AAB (v30)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  # ─── TypeScript check ────────────────────────────────────────────────────────
  verify:
    name: TypeScript + ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/

  # ─── Build Next.js (deploy su Vercel separatamente) ─────────────────────────
  build-nextjs:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      NEXT_PUBLIC_APP_URL: https://invoicestudio.app
      TURBOPACK: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # ─── Build Mobile AAB nativa (React Native / Expo) ──────────────────────────
  build-mobile-aab:
    name: Build Mobile AAB v30
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - run: npm ci

      - name: Prebuild Android (genera cartella android/)
        run: npx expo prebuild --platform android --no-install

      - name: Decode keystore e patch build.gradle per release signing
        run: |
          echo "" | base64 -d > android/app/release.keystore

          echo "ANDROID_KEYSTORE_PATH=release.keystore" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=android"      >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=invoicestudio"        >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=android"           >> $GITHUB_ENV

          python3 scripts/patch_build_gradle.py

      - name: Bundle AAB
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Find AAB (debug)
        if: always()
        run: |
          echo "=== Searching for .aab files ==="
          find android -name "*.aab" 2>/dev/null || echo "No .aab found"
          echo "=== Release output dir ==="
          ls -la android/app/build/outputs/bundle/release/ 2>/dev/null || echo "Dir not found"

      - name: Upload Mobile AAB v30
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceStudio-Mobile-AAB-v30
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload Mapping File (Deobfuscation)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceStudio-Mapping-v30
          path: mobile/android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 90

  # ─── Build APK Debug per test rapido (installa direttamente via Telegram) ───
  build-apk-debug:
    name: Build APK Debug (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - run: npm ci

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Build APK Debug
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK Debug
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: InvoiceStudio-APK-Debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

  # ─── Summary ─────────────────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [verify, build-nextjs, build-mobile-aab, build-apk-debug]
    if: always()
    steps:
      - name: Build status
        run: |
          echo "## 🏗️ InvoiceStudio Build Status — v30" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript + ESLint | ${{ needs.verify.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Next.js build | ${{ needs.build-nextjs.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile AAB v30 (React Native) | ${{ needs.build-mobile-aab.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **AAB download**: Actions → Artifacts → **InvoiceStudio-Mobile-AAB-v30**" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Package**: com.Invoice_Studio.myapp | versionCode: 30" >> $GITHUB_STEP_SUMMARY
